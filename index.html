<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cinematic Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-text">Loading Experience...</div>
</div>

<!-- CANVAS -->
<canvas id="bg"></canvas>

<!-- NAV -->
<nav>
  <h1>Portfolio</h1>
</nav>

<!-- HERO -->
<section class="section hero">
  <div class="content">
    <h1 class="reveal">Your Name</h1>
    <p class="reveal">Creative Developer • 3D • UI/UX</p>
    <button class="btn reveal">Explore Work</button>
  </div>
</section>

<!-- ABOUT -->
<section class="section about">
  <div class="glass reveal">
    <h2>About Me</h2>
    <p>I create cinematic, interactive, and immersive digital experiences.</p>
  </div>
</section>

<!-- PROJECTS -->
<section class="section projects">
  <h2 class="section-title reveal">Projects</h2>

  <div class="project-grid">
    <div class="card">
      <h3>Project One</h3>
      <p>3D Experience</p>
    </div>

    <div class="card">
      <h3>Project Two</h3>
      <p>Web Animation</p>
    </div>

    <div class="card">
      <h3>Project Three</h3>
      <p>UI Design</p>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section class="section contact">
  <div class="glass reveal">
    <h2>Contact</h2>
    <p>Email: your@email.com</p>
  </div>
</section>

<!-- SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script src="script.js"></script>

</body>
</html>
